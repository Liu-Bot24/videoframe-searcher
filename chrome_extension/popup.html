<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VFS Lens Plugin</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      width: 320px;
      background: #f7f8fa;
      color: #1f2937;
    }
    .wrap {
      padding: 12px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      padding: 10px 12px;
      cursor: pointer;
    }
    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">VFS Google Lens 插件</div>
    <div class="desc">
      插件仅有开启/关闭两种状态。<br>
      开启后，桌面程序提交搜索任务时会自动上传。<br>
      关闭后，桌面程序会提示“请开启插件”。
    </div>
    <button id="toggleBtn">开启插件</button>
    <div id="status" class="status">等待开始…</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
